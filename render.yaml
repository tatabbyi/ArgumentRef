services:
  - type: web
    name: argumentref-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: AUDIO_STORAGE_DIR
        value: /tmp/argumentref-sessions
      - key: MAX_AUDIO_CHUNK_BYTES
        value: 1048576
      - key: DATABASE_URL
        sync: false
      - key: DEEPGRAM_MODEL
        value: nova-3
      - key: DEEPGRAM_LANGUAGE
        value: en-US
      - key: FACT_CHECK_ENABLED
        value: true
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: GOOGLE_FACT_CHECK_LANGUAGE_CODE
        value: en-US
      - key: GOOGLE_FACT_CHECK_PAGE_SIZE
        value: 3
      - key: FACT_CHECK_MAX_CLAIMS_PER_SESSION
        value: 5
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: COMPROMISE_INITIAL_DELAY_MS
        value: 60000
      - key: COMPROMISE_INTERVAL_MS
        value: 30000
      - key: FALLACY_DETECTION_ENABLED
        value: true
      - key: FALLACY_ANALYSIS_INTERVAL_MS
        value: 20000
      - key: FALLACY_MIN_CONFIDENCE
        value: medium
      - key: ARGUMENT_RATING_ENABLED
        value: true
      - key: ARGUMENT_RATING_INTERVAL_MS
        value: 30000
      - key: ARGUMENT_RATING_MIN_TRANSCRIPT_LINES
        value: 4
      - key: REFEREE_INTERVENTIONS_ENABLED
        value: true
      - key: REFEREE_INTERVENTION_COOLDOWN_MS
        value: 10000
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: JBFqnCBsd6RMkjVDRZzb
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2
      - key: ELEVENLABS_OUTPUT_FORMAT
        value: mp3_44100_128
      - key: ELEVENLABS_MAX_TEXT_CHARS
        value: 600
