services:
  - type: web
    name: argumentref-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: AUDIO_STORAGE_DIR
        value: /tmp/argumentref-sessions
      - key: MAX_AUDIO_CHUNK_BYTES
        value: 1048576
      - key: DEEPGRAM_MODEL
        value: nova-3
      - key: DEEPGRAM_LANGUAGE
        value: en-US
      - key: FACT_CHECK_ENABLED
        value: true
      - key: GOOGLE_FACT_CHECK_API_KEY
        sync: false
      - key: GOOGLE_FACT_CHECK_LANGUAGE_CODE
        value: en-US
      - key: GOOGLE_FACT_CHECK_PAGE_SIZE
        value: 3
      - key: FACT_CHECK_MAX_CLAIMS_PER_SESSION
        value: 5
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: ROOM_TONE_GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: COMPROMISE_INITIAL_DELAY_MS
        value: 30000
      - key: COMPROMISE_INTERVAL_MS
        value: 30000
